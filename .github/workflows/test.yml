name: Test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  server:
    name: Server (Rust)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: true
          cache-workspaces: server -> target

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev

      - name: Build
        working-directory: server
        run: cargo build --verbose

      - name: Test
        working-directory: server
        run: cargo test --verbose

      - name: Clippy
        working-directory: server
        run: cargo clippy -- -D warnings

  web:
    name: Web (Vue.js)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Type check
        working-directory: web
        run: npx vue-tsc --noEmit

      - name: Build
        working-directory: web
        run: npm run build

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # --- Server ---
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: true
          cache-workspaces: server -> target

      - name: Install server dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev

      - name: Build server
        working-directory: server
        run: cargo build --verbose

      # --- Web ---
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        working-directory: web
        run: npm ci

      - name: Build web
        working-directory: web
        run: npx vite build

      # --- Playwright ---
      - name: Install Playwright
        working-directory: web
        run: npx playwright install --with-deps chromium

      # --- Start Polaris and run tests ---
      - name: Create blank config
        run: |
          touch server/automated.config.toml

      - name: Start Polaris and run tests
        working-directory: web
        run: |
          mkdir -p /tmp/polaris-data
          (cd ../server && cargo run -- \
            -f \
            -c automated.config.toml \
            -w ../web/dist \
            --data /tmp/polaris-data \
            --bind-address 127.0.0.1 \
            -p 5050 &)

          # Wait for server to be ready
          for i in $(seq 1 60); do
            if curl -sf http://localhost:5050/api/version > /dev/null 2>&1; then
              echo "Server ready after ${i}s"
              break
            fi
            sleep 1
          done

          npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 30
