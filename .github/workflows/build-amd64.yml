name: Build AMD64 Binary

on:
  workflow_dispatch:

jobs:
  build-amd64:
    name: Build AMD64 Binary
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: x86_64-unknown-linux-gnu
          cache: true
          cache-workspaces: server -> target

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev

      - name: Build release binary
        run: cargo build --release --bin polaris
        working-directory: server

      - name: Package binary
        run: tar czf polaris-amd64.tar.gz polaris
        working-directory: server/target/release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: polaris-amd64
          path: server/target/release/polaris-amd64.tar.gz
          retention-days: 90

      - name: Generate tag
        id: tag
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          TAG="latest-amd64-$(date +%Y%m%d)-${SHORT_SHA}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "Tag: ${TAG}"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "Latest AMD64 Build - ${{ steps.tag.outputs.tag }}"
          files: server/target/release/polaris-amd64.tar.gz
          body: |
            Auto-generated AMD64 build from commit ${{ github.sha }}.
            Branch: `${{ github.ref_name }}`
          draft: false
          prerelease: true
          generate_release_notes: true
