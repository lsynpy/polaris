name: Build ARM64 Binary

on:
  push:
    branches: [master, release]
  workflow_dispatch:

jobs:
  build-arm64:
    name: Build ARM64 Binary
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: aarch64-unknown-linux-gnu

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev

      - name: Build release binary
        run: cargo build --release --bin polaris

      - name: Create release tarball
        run: |
          mkdir -p release
          cp target/release/polaris release/
          cd release
          tar czf polaris-arm64.tar.gz polaris

      - name: Create release tag
        run: |
          TAG="latest-$(date +%Y%m%d)-${GITHUB_SHA:0:7}"
          git tag "${TAG}"
          git push origin "${TAG}"
          echo "RELEASE_TAG=${TAG}" >> "${GITHUB_ENV}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: "Latest ARM64 Build - ${{ env.RELEASE_TAG }}"
          files: release/polaris-arm64.tar.gz
          generate_release_notes: true
          make_latest: true
