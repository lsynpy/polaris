name: Build & Push Docker Image

on:
  push:
    branches: [master, release]
  workflow_dispatch:

env:
  REGISTRY: registry.cn-hangzhou.aliyuncs.com
  NAMESPACE: cwpypy
  IMAGE_NAME: polaris

jobs:
  build-binary:
    name: Build ARM64 Binary
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: aarch64-unknown-linux-gnu

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev

      - name: Build release binary
        run: cargo build --release --bin polaris

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: polaris-arm64
          path: target/release/polaris
          retention-days: 90

  build-and-push:
    name: Build & Push Docker Image
    needs: build-binary
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Download ARM64 binary
        uses: actions/download-artifact@v4
        with:
          name: polaris-arm64
          path: ./docker-build

      - name: Make binary executable
        run: chmod +x ./docker-build/polaris

      - name: Download web UI
        run: |
          mkdir -p ./docker-build/web
          curl -sL -o /tmp/web.zip https://github.com/agersant/polaris-web/releases/latest/download/web.zip
          (cd ./docker-build/web && unzip -q /tmp/web.zip)
          rm -f /tmp/web.zip

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Aliyun ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ALIYUN_ACR_USERNAME }}
          password: ${{ secrets.ALIYUN_ACR_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./docker-build
          file: ./Dockerfile.runtime
          push: true
          platforms: linux/arm64
          tags: |
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
