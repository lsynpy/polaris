default_install_hook_types:
  - pre-commit
default_stages:
  - pre-commit

repos:
  - repo: local
    hooks:
      # Rust formatting
      - id: cargo-fmt
        name: cargo fmt
        entry: cargo fmt
        language: system
        types: [rust]
        pass_filenames: false
        args: [--manifest-path, server/Cargo.toml]

      # Rust linting
      - id: cargo-clippy
        name: cargo clippy
        entry: cargo clippy
        language: system
        types: [rust]
        pass_filenames: false
        args: [--manifest-path, server/Cargo.toml, --, -D, warnings]

      # Config file validation
      - id: check-yaml
        name: check yaml
        entry: check-yaml
        language: system
        types: [yaml]

      - id: check-toml
        name: check toml
        entry: check-toml
        language: system
        types: [toml]

      - id: check-json
        name: check json
        entry: check-json
        language: system
        types: [json]

      # File hygiene
      - id: end-of-file-fixer
        name: fix end of file
        entry: end-of-file-fixer
        language: system
        types: [text]

      - id: trailing-whitespace
        name: trim trailing whitespace
        entry: trailing-whitespace-fixer
        language: system
        types: [text]

      - id: check-added-large-files
        name: check for added large files
        entry: check-added-large-files
        language: system
        args: [--maxkb=50000]

      - id: check-merge-conflict
        name: check for merge conflicts
        entry: check-merge-conflict
        language: system
        types: [text]

      - id: detect-private-key
        name: detect private key
        entry: detect-private-key
        language: system
        types: [text]

      # Markdown
      - id: rumdl
        name: rumdl fmt
        entry: rumdl fmt
        language: system
        types: [markdown]

      # Spelling
      - id: typos
        name: check spelling
        entry: typos
        language: system
        types: [text]
        args: [-w]
